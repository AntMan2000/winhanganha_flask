<div class="container padb">
  <h2>Assessment Metadata</h2>
  <p>Reviewers update this section to define cultural access conditions before the item is released or restricted.</p>
  <form action="" methond="POST">
    <div class="form-row">
      <div class="form-group col-md-4">
        <label for="accessDecision">Recommended access level</label>
        <select class="form-control" id="accessDecision">
          {% for option in ['','Under Review', 'Public', 'Restricted', 'Private'] %}<option {% if option == assessment.recommended_access_level %}selected{% endif %}>{{ option }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group col-md-4">
        <label for="culturalSensitivity">Cultural sensitivity</label>
        <select class="form-control" id="culturalSensitivity">
          {% for option in ['', 'High', 'Medium', 'Low', 'Not yet assessed'] %}<option {% if option == assessment.cultural_sensitivity %}selected{% endif %}>{{ option }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group col-md-4">
        <label for="approvalStatus">Approval status</label>
        <select class="form-control" id="approvalStatus">
          {% for option in ['','Awaiting Elder review', 'Approved for public release', 'Approved with restrictions', 'Not approved for public release'] %}<option {% if option == assessment.approval_status %}selected{% endif %}>{{ option }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group"><label for="culturalNotes">Cultural notes</label><textarea class="form-control" id="culturalNotes">{{ assessment.cultural_notes }}</textarea></div>
    <div class="form-group"><label for="accessConditions">Access conditions</label><textarea class="form-control" id="accessConditions">{{ assessment.access_conditions }}</textarea></div>
    <div class="form-group"><label for="publicDescription">Approved public description</label><textarea class="form-control" id="publicDescription">{{ assessment.public_description }}</textarea></div>
    <button type="submit" class="btn btn-dark mybutton saveMetadata">Save assessment metadata</button>
  </form>
</div>
